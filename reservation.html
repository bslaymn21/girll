<!DOCTYPE html>
<html class="light" lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="description" content="Book your table at MASHWIYATKOM. Authentic charcoal grill experience with premium seating for family feasts." />
    <meta name="keywords" content="Table Reservation Kebab, Book Grill Restaurant, BBQ Dining Reservation" />
    <title>مشوياتكم | احجز طاولتك</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700;800&amp;family=Work+Sans:wght@400;600&amp;family=Noto+Kufi+Arabic:wght@400;700&amp;family=Noto+Sans+Arabic:wght@400;700&amp;display=swap" rel="stylesheet" />

    <!-- Material Symbols -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Shared Configuration & Styles -->
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/styles.css">

    <!-- Translation & Theme System -->
    <script src="./js/translations.js"></script>
    <script src="./js/language-selector.js"></script>
    <script src="./js/theme-manager.js"></script>
    <script src="./js/preloader.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/cart-global.js"></script>
    <script src="./js/visual-effects.js"></script>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/933/933310.png">
</head>

<body class="font-body-md text-on-background dark:bg-[#0a1014] transition-colors rtl-mode">
    <!-- TopAppBar -->
    <header class="glass-surface border-b border-slate-200 dark:border-white/10 docked full-width top-0 sticky z-50 transition-colors">
        <div class="flex justify-between items-center w-full px-6 py-4 mx-auto max-w-container-max">
            <div class="flex items-center gap-4">
                <span class="text-lg font-bold tracking-widest text-[#991b1b] dark:text-[#f87171] font-h1" data-i18n="brand_name">مشوياتكم</span>
            </div>
            <nav class="hidden md:flex gap-md items-center">
                <a class="text-slate-500 dark:text-slate-400 font-h3 text-sm tracking-tight transition-colors duration-200 hover:text-[#991b1b]" href="index.html" data-i18n="nav_home">الرئيسية</a>
                <a class="text-slate-500 dark:text-slate-400 font-h3 text-sm tracking-tight transition-colors duration-200 hover:text-[#991b1b]" href="menu.html" data-i18n="nav_menu">المنيو</a>
                <a class="text-[#991b1b] dark:text-[#f87171] font-bold font-h3 text-sm tracking-tight transition-colors duration-200" href="reservation.html" data-i18n="nav_orders">حجز طاولة</a>
                <a class="text-slate-500 dark:text-slate-400 font-h3 text-sm tracking-tight transition-colors duration-200 hover:text-[#991b1b]" href="contact.html" data-i18n="nav_contact">اتصل بنا</a>
            </nav>
            <div class="flex items-center gap-3">
                <button onclick="toggleLanguage()"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-white/5 rounded-full transition-colors flex items-center justify-center text-slate-500">
                    <span class="material-symbols-outlined">translate</span>
                </button>
                <button id="theme-toggle"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-white/5 rounded-full transition-colors flex items-center justify-center text-slate-500">
                    <span class="material-symbols-outlined">dark_mode</span>
                </button>
            </div>
        </div>
    </header>

    <main class="min-h-screen pt-24 pb-20">
        <section class="max-w-4xl mx-auto px-6 text-center mb-16">
            <h1 class="text-4xl md:text-6xl font-h1 text-[#991b1b] dark:text-white mb-6 uppercase tracking-tight" data-i18n="res_title">احجز طاولتك</h1>
            <p class="text-slate-500 dark:text-slate-400 max-w-2xl mx-auto text-lg leading-relaxed" data-i18n="res_desc">انضم إلينا في رحلة طهوية لا تُنسى. احجز مكانك في صالة الطعام الملكية.</p>
        </section>

        <section class="max-w-xl mx-auto px-6">
            <div class="bg-white dark:bg-[#1a1c1e] p-8 md:p-12 border border-slate-200 dark:border-white/5 shadow-2xl rounded-3xl">
                <form id="reservation-form" class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2" data-i18n="res_label_name">الاسم الكامل</label>
                        <input type="text" id="res-name" required class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 p-4 rounded-xl text-slate-900 dark:text-white" />
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase mb-2" data-i18n="res_label_phone">رقم الهاتف</label>
                        <input type="tel" id="res-phone" required class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 p-4 rounded-xl text-slate-900 dark:text-white" />
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-2" data-i18n="res_label_guests">عدد الضيوف</label>
                            <input type="number" id="res-guests" min="1" max="20" required class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 p-4 rounded-xl text-slate-900 dark:text-white" />
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase mb-2" data-i18n="res_label_datetime">الوقت</label>
                            <input type="datetime-local" id="res-datetime" required class="w-full bg-slate-50 dark:bg-white/5 border border-slate-200 dark:border-white/10 p-4 rounded-xl text-slate-900 dark:text-white" />
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-[#991b1b] text-white py-5 rounded-xl font-bold text-lg hover:bg-orange-600 transition-all shadow-xl">تأكيد الحجز</button>
                </form>
            </div>
        </section>
    </main>

    <!-- Bottom Nav -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center bg-white dark:bg-slate-900 px-2 pb-safe border-t border-slate-200 dark:border-slate-800 z-50 h-16">
        <a class="flex flex-col items-center justify-center text-slate-400 pt-2 flex-1 h-full active:scale-95 transition-transform" href="index.html">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-bold uppercase" data-i18n="nav_home">الرئيسية</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 pt-2 flex-1 h-full active:scale-95 transition-transform relative" href="menu.html">
            <span class="material-symbols-outlined">restaurant_menu</span>
            <span class="text-[10px] font-bold uppercase" data-i18n="nav_menu">المنيو</span>
            <span class="global-cart-badge absolute top-1 right-1/2 translate-x-4 bg-[#991b1b] text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center border border-white dark:border-slate-900 hidden">0</span>
        </a>
        <a class="flex flex-col items-center justify-center text-orange-600 border-t-2 border-orange-600 pt-2 flex-1 h-full active:scale-95 transition-transform" href="reservation.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">event_seat</span>
            <span class="text-[10px] font-bold uppercase" data-i18n="nav_orders">الحجز</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 pt-2 flex-1 h-full active:scale-95 transition-transform" href="contact.html">
            <span class="material-symbols-outlined">location_on</span>
            <span class="text-[10px] font-bold uppercase" data-i18n="nav_contact">تواصل</span>
        </a>
    </nav>


    <footer class="bg-slate-50 dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 py-12 text-center">
        <span class="font-bold text-[#991b1b] font-h1 text-2xl tracking-widest" data-i18n="brand_name">مشوياتكم</span>
    </footer>

    <script>
        document.getElementById('reservation-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('res-name').value;
            const phone = document.getElementById('res-phone').value;
            const guests = document.getElementById('res-guests').value;
            const datetime = document.getElementById('res-datetime').value;

            const message = `🔥 *حجز طاولة جديد - مشوياتكم* 🔥\n\n` +
                            `👤 *الاسم:* ${name}\n` +
                            `📱 *الهاتف:* ${phone}\n` +
                            `👥 *عدد الأفراد:* ${guests} أفراد\n` +
                            `⏰ *الموعد:* ${datetime}\n\n` +
                            `✨ نرجو تأكيد الحجز في أقرب وقت.`;
                            
            window.open(`https://wa.me/201099995678?text=${encodeURIComponent(message)}`, '_blank');
        });
    </script>
</body>
</html>

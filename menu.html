<!DOCTYPE html>
<html class="light" lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="description" content="Explore our menu of premium Charcoal Grills. From Kebab and Kofta to Shish Tawook and Family Feasts at MASHWIYATKOM." />
    <meta name="keywords" content="Grill Menu, Kebab Alexandria, Kofta, Family Grill Platters, Authentic Egyptian BBQ" />
    <title>مشوياتكم | القائمة</title>

    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700;800&amp;family=Work+Sans:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />

    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Shared Configuration & Styles -->
    <script src="./js/tailwind-config.js"></script>
    <link rel="stylesheet" href="./css/styles.css">

    <!-- Translation & Theme System -->
    <script src="./js/translations.js"></script>
    <script src="./js/language-selector.js"></script>
    <script src="./js/theme-manager.js"></script>
    <script src="./js/preloader.js"></script>
    <script src="./js/cart-global.js"></script>
    <script src="./js/visual-effects.js"></script>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/933/933310.png">
</head>

<body class="font-body-md text-on-surface rtl-mode transition-colors">
    <!-- TopAppBar -->
    <header
        class="glass-surface border-b border-slate-200 dark:border-white/10 docked full-width top-0 sticky z-50 transition-colors">
        <div class="flex justify-between items-center w-full px-6 py-4 mx-auto max-w-container-max">
            <div class="flex items-center gap-4">
                <span class="text-lg font-bold tracking-widest text-[#991b1b] dark:text-[#f87171] font-h1"
                    data-i18n="brand_name">مشوياتكم</span>
            </div>
            <nav class="hidden md:flex gap-md items-center">
                <a class="text-slate-500 dark:text-slate-400 font-label-caps hover:text-[#991b1b] transition-colors"
                    href="index.html" data-i18n="nav_home">الرئيسية</a>
                <a class="text-[#991b1b] dark:text-[#f87171] font-bold font-label-caps"
                    href="menu.html" data-i18n="nav_menu">المنيو</a>
                <a class="text-slate-500 dark:text-slate-400 font-label-caps hover:text-[#991b1b] transition-colors"
                    href="reservation.html" data-i18n="nav_orders">حجز طاولة</a>
                <a class="text-slate-500 dark:text-slate-400 font-label-caps hover:text-[#991b1b] transition-colors"
                    href="contact.html" data-i18n="nav_contact">اتصل بنا</a>
            </nav>
            <div class="flex items-center gap-3">
                <button onclick="toggleLanguage()"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-white/5 rounded-full transition-colors flex items-center justify-center text-slate-500">
                    <span class="material-symbols-outlined">translate</span>
                </button>
                <button id="theme-toggle"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-white/5 rounded-full transition-colors flex items-center justify-center text-slate-500">
                    <span class="material-symbols-outlined">dark_mode</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-xl pb-32">
        <!-- Hero Section -->
        <div class="relative overflow-hidden mb-xl rounded-[2.5rem] min-h-[300px] md:min-h-[400px] flex items-center px-8 md:px-16 shadow-2xl">
            <div class="absolute inset-0 z-0">
                <img class="w-full h-full object-cover animate-ken-burns" src="https://images.unsplash.com/photo-1555939594-58d7cb561ad1?q=80&w=2070&auto=format&fit=crop">
                <div class="absolute inset-0 bg-black/60 dark:bg-black/80"></div>
                <div class="absolute inset-0 bg-gradient-to-r rtl:bg-gradient-to-l from-black/60 via-transparent to-transparent"></div>
            </div>
            <div class="relative z-10 max-w-2xl text-start">
                <span class="font-label-caps text-orange-500 tracking-widest mb-4 block" data-i18n="menu_tagline">أصل الطعام على الفحم</span>
                <h1 class="font-h1 text-4xl md:text-6xl text-white mb-base" data-i18n="menu_title">قائمة الطعام</h1>
                <p class="font-body-lg text-lg md:text-xl text-white/90 max-w-2xl" data-i18n="menu_desc">مجموعة مختارة من أروع أنواع اللحوم والمقبلات الشرقية، محضرة بدقة عصرية ونكهة تقليدية.</p>
            </div>
        </div>

        <!-- Filter Chips -->
        <div id="filter-container" class="flex justify-start gap-4 overflow-x-auto pb-6 no-scrollbar mb-10 border-b border-slate-100 dark:border-white/5">
            <button onclick="applyFilter('all', this)" class="active-filter bg-[#991b1b] text-white px-8 py-3 rounded-full font-bold whitespace-nowrap shadow-sm transition-all" data-i18n="filter_all">الكل</button>
            <button onclick="applyFilter('Starters', this)" class="bg-slate-100 dark:bg-white/5 text-slate-700 dark:text-white px-8 py-3 rounded-full font-bold whitespace-nowrap hover:bg-slate-200" data-i18n="filter_starters">مقبلات</button>
            <button onclick="applyFilter('Main Course', this)" class="bg-slate-100 dark:bg-white/5 text-slate-700 dark:text-white px-8 py-3 rounded-full font-bold whitespace-nowrap hover:bg-slate-200" data-i18n="filter_mains">أطباق رئيسية</button>
            <button onclick="applyFilter('Platters', this)" class="bg-slate-100 dark:bg-white/5 text-slate-700 dark:text-white px-8 py-3 rounded-full font-bold whitespace-nowrap hover:bg-slate-200" data-i18n="filter_platters">صواني عائلية</button>
        </div>

        <!-- Menu Container -->
        <div id="menu-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Dynamic Items -->
        </div>
    </main>

    <!-- Cart Overlay -->
    <div id="cart-overlay" onclick="toggleCart()" class="cart-overlay"></div>
    
    <!-- Cart Drawer -->
    <div id="cart-drawer" class="cart-drawer">
        <div class="p-6 border-b border-slate-100 dark:border-white/10 flex justify-between items-center">
            <h2 class="text-2xl font-black text-[#991b1b] dark:text-white" data-i18n="cart_title">طلبك الحالي</h2>
            <button onclick="toggleCart()" class="p-2 hover:bg-slate-100 dark:hover:bg-white/5 rounded-full">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div id="cart-items" class="flex-grow overflow-y-auto p-6 space-y-4">
            <!-- Cart items here -->
        </div>
        <div class="p-6 border-t border-slate-100 dark:border-white/10 bg-slate-50 dark:bg-black/20">
            <div class="flex justify-between items-center mb-4">
                <span class="text-slate-500 font-bold" data-i18n="cart_total">الإجمالي</span>
                <span id="cart-total-price" class="text-2xl font-black text-orange-600">0 ج.م</span>
            </div>
            <button onclick="sendWhatsAppOrder()" class="w-full py-4 rounded-xl bg-[#25D366] text-white font-black text-lg flex items-center justify-center gap-2 shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
                <span class="material-symbols-outlined text-xl">send</span>
                <span data-i18n="btn_send_order">إرسال الطلب عبر واتساب</span>
            </button>
        </div>
    </div>

    <!-- Dish Modal -->
    <div id="dish-modal" class="fixed inset-0 z-[100] modal-overlay items-center justify-center p-4">
        <div class="absolute inset-0" onclick="closeModal()"></div>
        <div class="bg-white dark:bg-slate-900 w-full max-w-2xl rounded-[2.5rem] shadow-3xl overflow-hidden relative z-10 modal-content">
            <div id="modal-content-container">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <!-- Floating Order Button -->
    <div class="floating-cart-btn">
        <button onclick="toggleCart()" class="relative w-16 h-16 bg-orange-600 text-white rounded-full shadow-2xl flex items-center justify-center transition-all active:scale-90 hover:scale-105 bioluminescent-glow">
            <span class="material-symbols-outlined text-3xl">shopping_basket</span>
            <span id="floating-cart-count" class="absolute -top-1 -right-1 bg-[#991b1b] text-white text-[10px] font-bold w-6 h-6 rounded-full flex items-center justify-center border-2 border-white dark:border-slate-900 hidden">0</span>
        </button>
    </div>

    <!-- Bottom Nav -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center bg-white dark:bg-slate-900 px-2 pb-safe border-t border-slate-200 dark:border-slate-800 z-50 h-16">
        <a class="flex flex-col items-center justify-center text-slate-400 pt-2 flex-1 h-full active:scale-95 transition-transform" href="index.html">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-bold uppercase" data-i18n="nav_home">الرئيسية</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 pt-2 flex-1 h-full active:scale-95 transition-transform relative" href="menu.html">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
            <span class="text-[10px] font-bold uppercase" data-i18n="nav_menu">المنيو</span>
            <span class="global-cart-badge absolute top-1 right-1/2 translate-x-4 bg-[#991b1b] text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center border border-white dark:border-slate-900 hidden">0</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 pt-2 flex-1 h-full active:scale-95 transition-transform" href="reservation.html">
            <span class="material-symbols-outlined">event_seat</span>
            <span class="text-[10px] font-bold uppercase" data-i18n="nav_orders">الحجز</span>
        </a>
        <a class="flex flex-col items-center justify-center text-slate-400 pt-2 flex-1 h-full active:scale-95 transition-transform" href="contact.html">
            <span class="material-symbols-outlined">location_on</span>
            <span class="text-[10px] font-bold uppercase" data-i18n="nav_contact">تواصل</span>
        </a>
    </nav>

    <script src="./js/data.js"></script>
    <script>
        let cart = JSON.parse(localStorage.getItem('mashwiyatkom_cart') || '[]');
        let selectedOptions = { cooked: 'Well Done', spice: 'Medium' };

        document.addEventListener('DOMContentLoaded', () => {
            renderMenu('all');
            updateCartUI();
        });

        function renderMenu(filter) {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            const items = getMenuItems().filter(i => filter === 'all' || i.category === filter);
            const lang = localStorage.getItem('preferred_language') || 'ar';
            
            items.forEach(item => {
                const finalPrice = item.discountPrice || item.price;
                const hasOffer = !!item.discountPrice;
                const div = document.createElement('div');
                div.className = "bg-white dark:bg-[#1a1c1e] rounded-[2rem] overflow-hidden shadow-lg border border-slate-50 dark:border-white/5 group transition-all hover:-translate-y-2 cursor-pointer relative";
                div.onclick = () => openModal(item.id);
                div.innerHTML = `
                    <div class="h-64 overflow-hidden relative">
                        <img src="${item.image}" alt="${lang === 'ar' ? item.name_ar : item.name_en}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute top-4 right-4 bg-[#991b1b] text-white px-5 py-2 rounded-full font-black text-sm shadow-xl">
                            ${hasOffer ? `<span class="text-[10px] line-through opacity-70 ml-1">${item.price}</span>` : ''}
                            ${finalPrice} ج.م
                        </div>
                        ${hasOffer ? '<div class="absolute top-4 left-4 bg-orange-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg border border-white/20">خصم خاص 🔥</div>' : ''}
                        ${!hasOffer && item.ordered > 1000 ? '<div class="absolute top-4 left-4 bg-orange-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Best Seller</div>' : ''}
                    </div>
                    <div class="p-8">
                        <h3 class="font-h3 text-xl mb-3 text-slate-900 dark:text-white group-hover:text-orange-600 transition-colors">${lang === 'ar' ? item.name_ar : item.name_en}</h3>
                        <p class="text-slate-500 dark:text-slate-400 text-sm mb-6 leading-relaxed line-clamp-2">${lang === 'ar' ? item.description_ar : item.description_en}</p>
                        <div class="flex items-center gap-2 mb-6 text-[10px] text-slate-400 font-bold uppercase tracking-widest italic">
                            <span class="material-symbols-outlined text-[14px]">local_fire_department</span>
                            تطلب كثيراً هذا الأسبوع
                        </div>
                        <button class="w-full bg-[#1a1010] text-white py-4 rounded-2xl font-black hover:bg-orange-600 transition-all active:scale-95 shadow-xl">
                            إضافة للطلب
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function applyFilter(cat, btn) {
            document.querySelectorAll('#filter-container button').forEach(b => {
                b.className = "bg-slate-100 dark:bg-white/5 text-slate-700 dark:text-white px-8 py-3 rounded-full font-bold whitespace-nowrap hover:bg-slate-200 transition-all";
            });
            btn.className = "active-filter bg-[#991b1b] text-white px-8 py-3 rounded-full font-bold whitespace-nowrap shadow-sm";
            renderMenu(cat);
        }

        function openModal(id) {
            const item = getMenuItems().find(i => i.id === id);
            const lang = localStorage.getItem('preferred_language') || 'ar';
            
            selectedOptions = { cooked: 'مطبوخ جيدااً', spice: 'وسط' };

            const container = document.getElementById('modal-content-container');
            container.innerHTML = `
                <div class="flex flex-col md:flex-row max-h-[90vh] overflow-y-auto">
                    <div class="md:w-1/2 relative h-64 md:h-auto overflow-hidden">
                         <img class="w-full h-full object-cover" src="${item.image}">
                         <button onclick="closeModal()" class="md:hidden absolute top-4 right-4 w-10 h-10 bg-black/40 text-white rounded-full flex items-center justify-center backdrop-blur-md">
                            <span class="material-symbols-outlined">close</span>
                         </button>
                    </div>
                    <div class="md:w-1/2 p-8 md:p-12 flex flex-col justify-between">
                        <div>
                             <div class="hidden md:flex justify-end mb-4">
                                <button onclick="closeModal()" class="text-slate-400 hover:text-[#991b1b] transition-colors">
                                    <span class="material-symbols-outlined">close</span>
                                </button>
                             </div>
                             <h2 class="text-3xl font-black text-slate-900 dark:text-white mb-4">${lang === 'ar' ? item.name_ar : item.name_en}</h2>
                             <p class="text-slate-500 dark:text-slate-400 mb-8 leading-relaxed">${lang === 'ar' ? item.description_ar : item.description_en}</p>
                             
                             <div class="space-y-6">
                                <div>
                                    <label class="block font-black text-slate-400 text-[10px] mb-4 uppercase tracking-[0.2em]">طريقة التسوية</label>
                                    <div class="flex flex-wrap gap-3">
                                        <div onclick="selectOption('cooked', 'نص سوا', this)" class="option-chip">نص سوا</div>
                                        <div onclick="selectOption('cooked', 'مطبوخ جيدااً', this)" class="option-chip active">مطبوخ جيدااً</div>
                                    </div>
                                </div>
                                <div>
                                    <label class="block font-black text-slate-400 text-[10px] mb-4 uppercase tracking-[0.2em]">مستوى الشطة</label>
                                    <div class="flex flex-wrap gap-3">
                                        <div onclick="selectOption('spice', 'بارد', this)" class="option-chip">بارد</div>
                                        <div onclick="selectOption('spice', 'وسط', this)" class="option-chip active">وسط</div>
                                        <div onclick="selectOption('spice', 'حار جداً 🔥', this)" class="option-chip">حار جداً 🔥</div>
                                    </div>
                                </div>
                             </div>
                        </div>

                        <div class="mt-12 flex items-center justify-between gap-6 border-t border-slate-50 dark:border-white/5 pt-8">
                            <div class="flex flex-col">
                                ${item.discountPrice ? `<span class="text-xs text-slate-400 line-through font-bold">${item.price} ج.م</span>` : ''}
                                <span class="text-3xl font-black text-orange-600">${item.discountPrice || item.price} ج.م</span>
                            </div>
                            <button onclick="addToOrder(${item.id})" class="flex-grow bg-[#991b1b] py-5 rounded-2xl text-white font-black text-lg hover:bg-orange-600 transition-all active:scale-95 shadow-2xl">
                                إضافة للطلب
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('dish-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
            
            // Hide floating button while modal is open
            const floatingBtn = document.querySelector('.floating-cart-btn');
            if (floatingBtn) floatingBtn.style.display = 'none';
        }

        function selectOption(type, value, el) {
            selectedOptions[type] = value;
            el.parentElement.querySelectorAll('.option-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }

        function closeModal() {
            document.getElementById('dish-modal').classList.remove('active');
            document.body.style.overflow = '';
            
            // Show floating button back
            const floatingBtn = document.querySelector('.floating-cart-btn');
            if (floatingBtn) floatingBtn.style.display = 'flex';
        }

        function addToOrder(id) {
            const item = getMenuItems().find(i => i.id === id);
            const lang = localStorage.getItem('preferred_language') || 'ar';
            
            const cartItem = {
                cartId: Date.now(),
                id: item.id,
                name: lang === 'ar' ? item.name_ar : item.name_en,
                price: item.discountPrice || item.price,
                options: { ...selectedOptions }
            };
            
            cart.push(cartItem);
            localStorage.setItem('mashwiyatkom_cart', JSON.stringify(cart));
            closeModal();
            updateCartUI();
            if (typeof updateGlobalCartBadge === 'function') updateGlobalCartBadge();
            if (typeof showToast === 'function') showToast(lang === 'ar' ? 'تمت الإضافة للسلة' : 'Added to cart');
            // toggleCart(true); // Don't pop drawer immediately, let user see the toast first
        }

        function toggleCart(forceOpen = false) {
            const drawer = document.getElementById('cart-drawer');
            const overlay = document.getElementById('cart-overlay');
            if (forceOpen) {
                drawer.classList.add('open');
                overlay.classList.add('active');
            } else {
                drawer.classList.toggle('open');
                overlay.classList.toggle('active');
            }
        }

        function updateCartUI() {
            const itemsContainer = document.getElementById('cart-items');
            const totalDisplay = document.getElementById('cart-total-price');
            const floatingCount = document.getElementById('floating-cart-count');

            if (cart.length === 0) {
                itemsContainer.innerHTML = `<div class="flex flex-col items-center justify-center h-64 opacity-30 text-slate-400">
                    <span class="material-symbols-outlined text-6xl mb-4">shopping_basket</span>
                    <p class="font-black italic">سلة الطلبات فارغة</p>
                </div>`;
                if (floatingCount) floatingCount.classList.add('hidden');
                totalDisplay.innerText = '0 ج.م';
                return;
            }

            if (floatingCount) {
                floatingCount.classList.remove('hidden');
                floatingCount.innerText = cart.length;
            }

            itemsContainer.innerHTML = cart.map(item => `
                <div class="flex gap-4 bg-slate-50 dark:bg-white/5 p-5 rounded-2xl border border-slate-100 dark:border-white/10 group transition-all hover:border-orange-600/30">
                    <div class="flex-grow">
                        <h4 class="font-black text-slate-900 dark:text-white">${item.name}</h4>
                        <p class="text-[10px] text-slate-400 font-bold mt-1">${item.options.cooked} • شطة ${item.options.spice}</p>
                        <span class="text-orange-600 font-black mt-3 block">${item.price} ج.م</span>
                    </div>
                    <button onclick="removeFromCart(${item.cartId})" class="text-slate-300 hover:text-[#991b1b] transition-colors">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalDisplay.innerText = `${total} ج.م`;
        }

        function removeFromCart(cartId) {
            cart = cart.filter(i => i.cartId !== cartId);
            localStorage.setItem('mashwiyatkom_cart', JSON.stringify(cart));
            updateCartUI();
            if (typeof updateGlobalCartBadge === 'function') updateGlobalCartBadge();
        }

        function sendWhatsAppOrder() {
            if (cart.length === 0) return;
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            let message = `🍽️ *طلب جديد من مشوياتكم*\n\n`;
            
            cart.forEach((item, index) => {
                message += `${index + 1}. *${item.name}*\n`;
                message += `   - التسوية: ${item.options.cooked}\n`;
                message += `   - الشطة: ${item.options.spice}\n`;
                message += `   - السعر: ${item.price} ج.م\n\n`;
            });

            message += `------------------\n`;
            message += `💰 *الإجمالي: ${total} ج.م*`;
            
            const whatsappNumber = getSiteSettings().whatsapp;
            window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`, '_blank');
        }

        document.addEventListener('DOMContentLoaded', () => renderMenu('all'));
    </script>
</body>
</html>

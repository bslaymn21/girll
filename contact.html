        <div class="flex justify-between items-center w-full px-6 py-4 mx-auto max-w-container-max">

            <nav class="hidden md:flex gap-md items-center">

                <a class="text-slate-500 dark:text-slate-400 font-label-caps hover:text-[#991b1b]" href="menu.html" data-i18n="nav_menu">المنيو</a>

            </nav>
            <div class="flex items-center gap-3">
                <button onclick="toggleLanguage()"
                    class="p-2 hover:bg-slate-100 dark:hover:bg-white/5 rounded-full transition-colors flex items-center justify-center text-slate-500">
                    <span class="material-symbols-outlined">translate</span>
                </button>
                <button id="theme-toggle"

                    <span class="material-symbols-outlined">dark_mode</span>
                </button>
            </div>
        </div>

            <h1 class="font-h1 text-4xl md:text-6xl text-[#991b1b] dark:text-white mb-6" data-i18n="contact_title">اتصل بنا</h1>

        </div>

                <h3 class="text-2xl font-bold mb-2 text-slate-900 dark:text-white" data-i18n="contact_whatsapp_title">راسلنا عبر واتساب</h3>
                <a href="https://wa.me/201099995678" target="_blank" class="block w-full bg-[#25D366] text-white py-4 rounded-xl font-bold mt-8 shadow-lg">ابدأ المحادثة الآن</a>
            </div>
            <div class="bg-white dark:bg-[#1a1c1e] p-8 rounded-3xl border border-slate-200 dark:border-white/5 shadow-xl">
                <div class="w-16 h-16 bg-red-100 text-red-600 rounded-2xl flex items-center justify-center mb-6 mx-auto"><span class="material-symbols-outlined text-4xl">call</span></div>

                <a href="tel:+201099995678" class="block w-full bg-[#991b1b] text-white py-4 rounded-xl font-bold mt-8 shadow-lg text-ltr">+20 10 9999 5678</a>
            </div>
        </div>

                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4s1.791-4 4-4 4 1.791 4 4-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>

                    <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.17-2.89-.6-4.09-1.47-.88-.64-1.61-1.47-2.11-2.43-.02 3.41 0 6.82-.01 10.23-.19 2.04-1.25 4.03-3.1 5.04-1.6.87-3.62 1-5.32.36-1.73-.65-3.08-2.2-3.41-4.01-.48-2.58.74-5.35 3.09-6.52.79-.39 1.66-.58 2.54-.58.31 0 .62.01.93.04v4.03c-.22-.05-.44-.1-.67-.1-1.04-.13-2.11.26-2.82 1.05-.75.82-.87 2.05-.33 3.01.55.97 1.68 1.51 2.76 1.38 1.09-.13 1.95-1.01 2.11-2.09.02-3.8 0-7.61.01-11.41z"/></svg>

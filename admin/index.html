<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>السلطان | دخول الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0a0a0a; color: white; }
        .login-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .glow-button {
            box-shadow: 0 0 20px rgba(255, 77, 0, 0.2);
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen p-6 overflow-hidden">
    <!-- Animatedbg -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-[#ff4d00]/10 blur-[120px] rounded-full animate-pulse"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-orange-600/5 blur-[120px] rounded-full animate-pulse" style="animation-delay: 2s"></div>
    </div>

    <div class="w-full max-w-md relative z-10">
        <div class="login-glass rounded-[40px] overflow-hidden shadow-2xl p-8 md:p-12 text-center border-t border-white/10">
            <div class="mb-10">
                <img src="../assets/logo.png" alt="Sultan Logo" class="h-32 w-auto mx-auto mb-6 drop-shadow-[0_0_15px_rgba(255,77,0,0.3)]">
                <h1 class="text-white text-3xl font-black tracking-widest uppercase mb-2">AL SULTAN</h1>
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.4em]">Administration System</p>
            </div>

            <div class="space-y-6">
                <div class="p-6 bg-[#ff4d00]/5 rounded-3xl border border-[#ff4d00]/10 mb-8">
                    <p class="text-sm font-bold text-gray-300">مرحباً بك مجدداً في نظام الإدارة</p>
                    <p class="text-[10px] text-gray-500 mt-2 uppercase tracking-widest">Secure Access Enabled</p>
                </div>

                <button onclick="window.location.href='dashboard.html'"
                    class="w-full bg-[#ff4d00] py-5 rounded-2xl text-white font-black tracking-[0.2em] uppercase glow-button hover:scale-[1.02] active:scale-95 transition-all shadow-xl flex justify-center items-center gap-3">
                    <span>دخول النظام</span>
                    <span class="material-symbols-outlined text-xl">login</span>
                </button>
            </div>

            <div class="mt-12 pt-8 border-t border-white/5">
                <a href="../index.html" class="text-gray-500 hover:text-white text-[10px] font-bold uppercase tracking-widest transition-colors flex items-center justify-center gap-2">
                    العودة للموقع
                    <span class="material-symbols-outlined text-sm">arrow_forward</span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
